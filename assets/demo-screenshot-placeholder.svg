<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="84" y1="48" x2="1316" y2="852" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF6FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .body { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .mono { font: 400 16px Consolas, 'Courier New', monospace; fill: #D6E2F5; }
      .monoDark { font: 400 15px Consolas, 'Courier New', monospace; fill: #0F172A; }
      .label { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #127475; letter-spacing: 0.08em; text-transform: uppercase; }
    </style>
  </defs>

  <rect x="24" y="24" width="1352" height="852" rx="34" fill="url(#bg)"/>
  <text x="100" y="102" class="title">Demo Screenshot Placeholder</text>
  <text x="100" y="134" class="body">Replace this with a real product screenshot once you capture the running API, Swagger page, or terminal output.</text>

  <rect x="92" y="182" width="1216" height="640" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>

  <rect x="92" y="182" width="1216" height="56" rx="28" fill="#EAF2FF"/>
  <circle cx="128" cy="210" r="8" fill="#F87171"/>
  <circle cx="154" cy="210" r="8" fill="#FBBF24"/>
  <circle cx="180" cy="210" r="8" fill="#34D399"/>
  <text x="218" y="216" class="body">http://localhost:8008/docs</text>

