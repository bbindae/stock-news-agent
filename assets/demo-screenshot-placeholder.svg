  <rect x="128" y="314" width="510" height="448" rx="22" fill="#F8FBFF" stroke="#D7E6FF" stroke-width="2"/>
  <text x="156" y="356" class="title" style="font-size:24px;">FastAPI Swagger UI</text>
  <text x="156" y="390" class="body">Capture the interactive request form and a successful response.</text>
  <rect x="156" y="428" width="454" height="56" rx="14" fill="#127475"/>
  <text x="184" y="463" style="font:700 18px 'Segoe UI', Arial, sans-serif; fill:#FFFFFF;">POST /api/v1/stock-news/news</text>
  <rect x="156" y="514" width="454" height="214" rx="16" fill="#FFFFFF" stroke="#D7E6FF" stroke-width="2"/>
  <text x="184" y="554" class="monoDark">{</text>
  <text x="204" y="580" class="monoDark">  "ticker": "AAPL",</text>
  <text x="204" y="606" class="monoDark">  "sector": "Technology",</text>
  <text x="204" y="632" class="monoDark">  "industry": "Consumer Electronics",</text>
  <text x="204" y="658" class="monoDark">  "news_list": [ ... ]</text>
  <text x="184" y="692" class="monoDark">}</text>

  <rect x="672" y="314" width="508" height="448" rx="22" fill="#0F172A"/>
  <text x="700" y="356" class="title" style="font-size:24px; fill:#FFFFFF;">Terminal / Runtime View</text>
  <text x="700" y="390" class="body" style="fill:#94A3B8;">Capture the application starting and handling a request.</text>
  <text x="700" y="442" class="mono">PS D:\DevStudio\Repos\stock-news-agent&gt; uv run python main.py</text>
  <text x="700" y="478" class="mono">[System] .env successfully loaded</text>
  <text x="700" y="514" class="mono">INFO:     Uvicorn running on http://0.0.0.0:8008</text>
  <text x="700" y="550" class="mono">INFO:     Application startup complete.</text>
  <text x="700" y="604" class="mono">POST /api/v1/stock-news/news</text>
  <text x="700" y="640" class="mono">ticker=AAPL</text>
  <text x="700" y="676" class="mono">load_news -> search_news -> summarize_news -> save_to_db</text>
  <text x="700" y="712" class="mono">200 OK</text>

